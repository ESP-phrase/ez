<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <rect width="400" height="400" rx="200" fill="url(#bgGrad)"/>

  <!-- Glow ring -->
  <circle cx="200" cy="200" r="196" stroke="url(#ringGrad)" stroke-width="4" fill="none" opacity="0.5"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Goat scaled to fill the circle nicely -->
  <!-- Left horn -->
  <path d="M137 158C119 117 96 64 72 26C62 8 78 -4 92 6C106 16 108 52 114 86C120 118 138 148 162 162Z"
    fill="white" filter="url(#softglow)" opacity="0.97"/>
  <!-- Left horn shadow -->
  <path d="M130 140C116 100 98 54 88 18C98 30 116 80 130 130Z" fill="rgba(0,0,0,0.10)"/>

  <!-- Right horn -->
  <path d="M263 158C281 117 304 64 328 26C338 8 322 -4 308 6C294 16 292 52 286 86C280 118 262 148 238 162Z"
    fill="white" filter="url(#softglow)" opacity="0.97"/>
  <!-- Right horn shadow -->
  <path d="M270 140C284 100 302 54 312 18C302 30 284 80 270 130Z" fill="rgba(0,0,0,0.10)"/>

  <!-- Left ear -->
  <path d="M72 200C46 176 30 218 52 232C68 242 100 230 88 202C82 188 72 200 72 200Z"
    fill="white" filter="url(#softglow)"/>

  <!-- Right ear -->
  <path d="M328 200C354 176 370 218 348 232C332 242 300 230 312 202C318 188 328 200 328 200Z"
    fill="white" filter="url(#softglow)"/>

  <!-- Face -->
  <ellipse cx="200" cy="268" rx="118" ry="128" fill="white" filter="url(#softglow)"/>

  <!-- Muzzle -->
  <ellipse cx="200" cy="330" rx="68" ry="44" fill="rgba(148,163,184,0.22)"/>

  <!-- Left eye - rectangular goat pupil -->
  <rect x="138" y="248" width="42" height="26" rx="10" fill="#0f172a"/>
  <!-- Right eye -->
  <rect x="222" y="248" width="42" height="26" rx="10" fill="#0f172a"/>

  <!-- Eye shine left -->
  <ellipse cx="148" cy="253" rx="6" ry="5" fill="white" opacity="0.45"/>
  <!-- Eye shine right -->
  <ellipse cx="232" cy="253" rx="6" ry="5" fill="white" opacity="0.45"/>

  <!-- Beard -->
  <path d="M160 388C154 408 170 414 200 414C230 414 246 408 240 388C228 372 172 372 160 388Z"
    fill="white" opacity="0.95"/>

  <!-- PolyGoat text -->
  <text x="200" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="0" fill="white" text-anchor="middle"/>
</svg>
